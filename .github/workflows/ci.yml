name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dependencies
        run: uv sync --dev
      - name: Format (ruff)
        run: uv run ruff format --check src tests
      - name: Lint (ruff)
        run: uv run ruff check src tests
      - name: Type check (mypy)
        run: uv run mypy src
      - name: Tests (offline)
        run: uv run pytest
      - name: Docs in sync with published stats
        run: uv run fair-measure sync-docs --check

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Tests (vitest)
        run: npm run test:unit -- --run
      - name: Type check + build
        run: npm run build
