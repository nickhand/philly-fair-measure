# fly.toml app configuration file generated for fair-measure-api on 2026-07-05T23:16:28-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# The ~500k-row screen frame loads into memory at startup, so the [[vm]] block
# needs headroom beyond the default 512 MB (see Justfile: `just fly-deploy`).

app = 'fair-measure-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PHILLY_ENV = 'prod'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm so requests never pay the cold start (Firecracker
  # boot + reloading the ~500k-row frame into memory ≈ up to a minute). The
  # second machine still autostops when idle and autostarts under load.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
