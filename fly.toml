# fly.toml app configuration file generated for fair-measure-api on 2026-07-05T23:16:28-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# The ~500k-row screen frame loads into memory at startup, so the [[vm]] block
# needs headroom beyond the default 512 MB (see Justfile: `just fly-deploy`).

app = 'fair-measure-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PHILLY_ENV = 'prod'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Suspend (not stop) when idle: the machine's RAM is snapshotted to disk, so
  # a request after a quiet spell resumes in a few seconds with the ~500k-row
  # frame already in memory — instead of the ~minute a cold 'stop' pays to boot
  # and reload it. Suspended machines aren't billed for CPU/RAM, only the small
  # snapshot storage, so idle cost is near zero.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'
