[project]
name = "philly-assessments"
version = "0.1.0"
description = "Philadelphia property assessment data package: verified public-data ingestion, snapshotting, and valuation modeling"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "duckdb>=1.0",
    "httpx>=0.27",
    "polars>=1.42.1",
    "pyarrow>=17",
    "pydantic>=2.7",
    "tenacity>=8.3",
]

[project.scripts]
philly = "philly_assessments.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.2",
    "respx>=0.21",
    "ruff>=0.5",
]

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
addopts = "-ra -m 'not live'"
markers = [
    "live: tests that hit real external APIs (deselected by default; run with -m live)",
]
testpaths = ["tests"]
